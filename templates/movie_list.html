<!DOCTYPE html>
<html>
<head>
    <title>BookMySeat - Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="mb-4 text-warning">Now Showing</h1>
        <div class="row">
            {% for movie in movies %}
            <div class="col-md-4 mb-4">
                <div class="card bg-secondary text-white shadow">
                    <div class="card-body">
                        <h4 class="card-title">{{ movie.title }}</h4>
                        <p class="card-text">{{ movie.genre }} | {{ movie.language }} | {{ movie.duration_minutes }} mins</p>
                        <a href="{% url 'show_list' movie.id %}" class="btn btn-warning w-100">Book Tickets</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
