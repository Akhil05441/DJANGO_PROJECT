<!DOCTYPE html>
{% load dict_filters %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMySeat - Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-wider text-red-500">BOOKMYSEAT</h1>
            <select id="sort-filter" class="bg-gray-800 text-white px-4 py-2 rounded border border-gray-700 focus:outline-none">
                <option value="-release_date" {% if current_sort == '-release_date' %}selected{% endif %}>Newest Releases</option>
                <option value="release_date" {% if current_sort == 'release_date' %}selected{% endif %}>Oldest Releases</option>
                <option value="-rating" {% if current_sort == '-rating' %}selected{% endif %}>Highest Rated</option>
            </select>
        </header>

        <div class="flex flex-col md:flex-row gap-8">
            <aside class="w-full md:w-1/4 bg-gray-800 p-6 rounded-lg h-fit border border-gray-700">
                <h2 class="text-xl font-semibold mb-6 pb-2 border-b border-gray-700">Filters</h2>
                
                <div class="mb-6">
                    <h3 class="text-sm font-medium uppercase tracking-wider text-gray-400 mb-3">Genres</h3>
                    <div class="space-y-2" id="genre-filters">
                        {% for genre in all_genres %}
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="genres" value="{{ genre.name }}" 
                                   {% if genre.name in selected_genres %}checked{% endif %}
                                   class="filter-checkbox form-checkbox h-4 w-4 rounded bg-gray-700 border-gray-600 text-red-500 focus:ring-0">
                            <span class="text-gray-300 group-hover:text-white transition">
                                {{ genre.name }} 
                                <span class="text-xs text-gray-500 font-mono">
                                    ({% if genre.name in genre_counts %}{{ genre_counts|dict_key:genre.name }}{% else %}0{% endif %})
                                </span>
                            </span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-medium uppercase tracking-wider text-gray-400 mb-3">Languages</h3>
                    <div class="space-y-2" id="language-filters">
                        {% for lang in all_languages %}
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="languages" value="{{ lang.name }}" 
                                   {% if lang.name in selected_languages %}checked{% endif %}
                                   class="filter-checkbox form-checkbox h-4 w-4 rounded bg-gray-700 border-gray-600 text-red-500 focus:ring-0">
                            <span class="text-gray-300 group-hover:text-white transition">{{ lang.name }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </aside>

            <main class="w-full md:w-3/4">
                <div id="movie-grid-container">
                    {% include 'partials/movie_grid.html' %}
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('movie-grid-container');
            const sortFilter = document.getElementById('sort-filter');

            function updateFilters(page = 1) {
                const checkedGenres = Array.from(document.querySelectorAll('input[name="genres"]:checked')).map(cb => cb.value);
                const checkedLanguages = Array.from(document.querySelectorAll('input[name="languages"]:checked')).map(cb => cb.value);
                const sortBy = sortFilter.value;

                // Build clean search params
                const params = new URLSearchParams();
                checkedGenres.forEach(g => params.append('genres', g));
                checkedLanguages.forEach(l => params.append('languages', l));
                params.append('sort', sortBy);
                params.append('page', page);

                // Update URL browser string dynamically without reloading page
                window.history.pushState({}, '', `${window.location.pathname}?${params.toString()}`);

                // High-performance Fetch request hitting our optimized view
                fetch(`${window.location.pathname}?${params.toString()}`, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = data.html;
                    attachPaginationListeners();
                })
                .catch(err => console.error('Error fetching filtered movies:', err));
            }

            function attachPaginationListeners() {
                document.querySelectorAll('.pagination-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = e.target.dataset.page;
                        updateFilters(page);
                    });
                });
            }

            // Bind update function to inputs change events
            document.querySelectorAll('.filter-checkbox').forEach(cb => cb.addEventListener('change', () => updateFilters(1)));
            sortFilter.addEventListener('change', () => updateFilters(1));
            attachPaginationListeners();
        });
    </script>
</body>
</html>
