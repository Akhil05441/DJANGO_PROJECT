<!DOCTYPE html>
<html>
<head>
    <title>{{ movie.title }} - Shows</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <a href="{% url 'movie_list' %}" class="text-warning text-decoration-none">&larr; Back to Movies</a>
        <h1 class="mt-3 mb-4">{{ movie.title }} - Select a Show</h1>
        <div class="list-group">
            {% for show in shows %}
            <a href="{% url 'seat_map' show.id %}" class="list-group-item list-group-item-action bg-secondary text-white mb-2 rounded">
                <strong>{{ show.screen_name }}</strong> - {{ show.start_time|date:"F j, Y, P" }}
                <span class="badge bg-warning text-dark float-end">₹{{ show.price }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
